<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Ramen House</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/client/css/style.css" rel="stylesheet">
  <link href="/client/css/auth.css" rel="stylesheet">
  <link href="/client/css/responsive.css" rel="stylesheet">
</head>
<body class="auth-body">

  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner-ramen"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <a class="auth-logo" href="/client/index.html">RAMEN <span>HOUSE</span></a>
      <p class="auth-subtitle">Create a free account to order delicious ramen</p>
    </div>
    <div class="auth-body-content">
      <form id="register-form">
        <div class="mb-3">
          <label for="name" class="form-label fw-semibold">Full Name *</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
          </div>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email Address *</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password *</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-end-0" id="password" placeholder="Min 6 characters" minlength="6" required>
            <button class="btn btn-outline-secondary border-start-0 bg-white" type="button" id="toggle-password" style="border: 1px solid #E0E0E0; border-left: none; color: var(--muted-color); border-top-right-radius: var(--border-radius-sm); border-bottom-right-radius: var(--border-radius-sm);">
              <i class="fas fa-eye" id="toggle-password-icon"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label fw-semibold">Phone Number</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-phone text-muted"></i></span>
            <input type="tel" class="form-control" id="phone" placeholder="123-456-7890">
          </div>
        </div>
        <div class="mb-4">
          <label for="address" class="form-label fw-semibold">Delivery Address</label>
          <textarea class="form-control" id="address" rows="2" placeholder="Street name, Building number..."></textarea>
        </div>
        <button type="submit" class="btn btn-ramen-primary w-100 py-3"><i class="fas fa-user-plus"></i> Register Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom JS Modules -->
  <script src="/client/js/api.js"></script>
  <script src="/client/js/auth.js"></script>
</body>
</html>
