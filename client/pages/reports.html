<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Reports - Ramen House</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/client/css/style.css" rel="stylesheet">
  <link href="/client/css/dashboard.css" rel="stylesheet">
  <link href="/client/css/responsive.css" rel="stylesheet">
</head>
<body>

  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner-ramen"></div>
  </div>

  <div class="dashboard-wrapper">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="dashboard-sidebar">
      <div class="sidebar-header">
        <a class="sidebar-brand" href="/client/index.html">RAMEN <span>HOUSE</span></a>
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-item">
          <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        </li>
        <li class="sidebar-item">
          <a href="inventory.html" class="sidebar-link"><i class="fas fa-boxes"></i> Inventory</a>
        </li>
        <li class="sidebar-item">
          <a href="menu.html" class="sidebar-link"><i class="fas fa-utensils"></i> Menu Management</a>
        </li>
        <li class="sidebar-item">
          <a href="orders.html" class="sidebar-link"><i class="fas fa-receipt"></i> Customer Orders</a>
        </li>
        <li class="sidebar-item">
          <a href="reports.html" class="sidebar-link active"><i class="fas fa-file-invoice-dollar"></i> Reports</a>
        </li>
        <li class="sidebar-item">
          <a href="profile.html" class="sidebar-link"><i class="fas fa-user-cog"></i> Profile Settings</a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link text-danger border-0 bg-transparent p-0" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="dashboard-content">
      <header class="dashboard-header">
        <div>
          <h4 class="fw-bold mb-1">Business Analytics & Reports</h4>
          <p class="text-muted mb-0 small">Compile restaurant reports, review transaction logs, and export PDF/Excel files.</p>
        </div>
        <div class="d-flex align-items-center">
          <button class="btn btn-ramen-outline d-lg-none me-3" onclick="document.getElementById('dashboard-sidebar').classList.toggle('active')">
            <i class="fas fa-bars"></i>
          </button>
          <div class="user-panel-header" onclick="window.location.href='profile.html'">
            <img id="header-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=150" class="user-avatar-header" alt="Admin avatar">
            <span class="fw-semibold d-none d-sm-inline">System Admin</span>
          </div>
        </div>
      </header>

      <!-- Selection panel -->
      <div class="dashboard-card-wrapper mb-4">
        <h5 class="fw-bold border-bottom pb-2 mb-3">Report Generator</h5>
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label for="report-type" class="form-label fw-semibold">Select Report Type</label>
            <select class="form-select" id="report-type">
              <option value="sales">Sales Report (Orders logs)</option>
              <option value="inventory">Inventory Report (Stock level details)</option>
              <option value="revenue">Revenue Report (Daily income trends)</option>
              <option value="best_selling">Best Selling Menu (Top ordered items)</option>
              <option value="low_stock">Low Stock Report (Ingredients warning list)</option>
            </select>
          </div>
          <div class="col-md-6 d-flex gap-2">
            <button class="btn btn-ramen-dark py-2 px-3 flex-grow-1" onclick="generatePreview()"><i class="fas fa-eye"></i> Preview Report</button>
            <button class="btn btn-ramen-primary py-2 px-3" onclick="exportFile('excel')" title="Export Excel"><i class="fas fa-file-excel"></i> Excel</button>
            <button class="btn btn-ramen-primary py-2 px-3" onclick="exportFile('pdf')" title="Export PDF"><i class="fas fa-file-pdf"></i> PDF</button>
          </div>
        </div>
      </div>

      <!-- Preview Report container -->
      <div class="dashboard-card-wrapper" id="preview-card" style="display: none;">
        <h5 class="card-title-dashboard border-bottom pb-2 mb-3" id="preview-title">Report Preview</h5>
        <div class="table-responsive">
          <table class="table table-ramen text-center align-middle">
            <thead id="preview-headers">
              <!-- Dynamically populated -->
            </thead>
            <tbody id="preview-list">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom JS Modules -->
  <script src="/client/js/api.js"></script>
  <script src="/client/js/auth.js"></script>
  <script>
    // Prefill header avatar on page load from local storage
    document.addEventListener('DOMContentLoaded', () => {
      const user = getLoggedInUser();
      if (user && user.profile_picture) {
        document.getElementById('header-avatar').src = `http://localhost:5000/uploads/${user.profile_picture}`;
      }
    });

    async function generatePreview() {
      const type = document.getElementById('report-type').value;
      const response = await apiRequest(`/reports?type=${type}`);

      if (!response || !response.success) {
        showToast('error', 'Failed to fetch preview details.');
        return;
      }

      const data = response.data;
      const card = document.getElementById('preview-card');
      const headersContainer = document.getElementById('preview-headers');
      const bodyContainer = document.getElementById('preview-list');

      document.getElementById('preview-title').textContent = `${type.toUpperCase().replace('_', ' ')} REPORT PREVIEW (${data.length} records found)`;
      card.style.display = 'block';

      if (data.length === 0) {
        headersContainer.innerHTML = '';
        bodyContainer.innerHTML = '<tr><td class="py-4 text-muted">No records found for this criteria.</td></tr>';
        return;
      }

      // Generate table headers based on columns returned
      const columns = Object.keys(data[0]);
      let headersHtml = '<tr>';
      columns.forEach(col => {
        headersHtml += `<th>${col.replace('_', ' ').toUpperCase()}</th>`;
      });
      headersHtml += '</tr>';
      headersContainer.innerHTML = headersHtml;

      // Generate rows
      let bodyHtml = '';
      data.forEach(row => {
        bodyHtml += '<tr>';
        columns.forEach(col => {
          let val = row[col];
          // formatting checks
          if (col.includes('price') || col.includes('revenue') || col.includes('sales')) {
            val = formatPrice(val);
          } else if (col.includes('date') || col.includes('last_updated')) {
            val = new Date(val).toLocaleString();
          } else if (val === null || val === undefined) {
            val = '-';
          }
          bodyHtml += `<td>${val}</td>`;
        });
        bodyHtml += '</tr>';
      });

      bodyContainer.innerHTML = bodyHtml;
    }

    async function exportFile(format) {
      const type = document.getElementById('report-type').value;
      const token = localStorage.getItem('token');
      
      showSpinner();
      try {
        const response = await fetch(`http://localhost:5000/api/reports/export?type=${type}&format=${format}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) throw new Error('Export failed');
        
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ramen_house_${type}_report.${format === 'excel' ? 'xlsx' : 'pdf'}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        showToast('success', 'Report file exported!');
      } catch (err) {
        showToast('error', 'Report export failed.');
      } finally {
        hideSpinner();
      }
    }
  </script>
</body>
</html>
