<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Ramen House</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/client/css/style.css" rel="stylesheet">
  <link href="/client/css/auth.css" rel="stylesheet">
  <link href="/client/css/responsive.css" rel="stylesheet">
</head>
<body class="auth-body">

  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner-ramen"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <a class="auth-logo" href="/client/index.html">RAMEN <span>HOUSE</span></a>
      <p class="auth-subtitle">Recover your password easily</p>
    </div>
    <div class="auth-body-content">
      <form id="forgot-form">
        <div class="mb-4">
          <label for="email" class="form-label fw-semibold">Registered Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
          </div>
          <div class="form-text text-muted mt-2">We will simulate sending a password reset link to this address.</div>
        </div>
        <button type="submit" class="btn btn-ramen-primary w-100 py-3"><i class="fas fa-paper-plane"></i> Send Recovery Link</button>
      </form>
      <div class="auth-footer">
        Back to <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom JS Modules -->
  <script src="/client/js/api.js"></script>
  <script src="/client/js/auth.js"></script>
</body>
</html>
