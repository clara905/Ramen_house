<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ramen House</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/client/css/style.css" rel="stylesheet">
  <link href="/client/css/auth.css" rel="stylesheet">
  <link href="/client/css/responsive.css" rel="stylesheet">
</head>
<body class="auth-body">

  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner-ramen"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <a class="auth-logo" href="/client/index.html">RAMEN <span>HOUSE</span></a>
      <p class="auth-subtitle">Login to place orders and manage system</p>
    </div>
    <div class="auth-body-content">
      <form id="login-form">
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required value="customer@ramenhouse.com">
          </div>
        </div>
        <div class="mb-4">
          <div class="d-flex justify-content-between mb-1">
            <label for="password" class="form-label fw-semibold mb-0">Password</label>
            <a href="forgot-password.html" class="text-primary-ramen text-decoration-none small">Forgot Password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-end-0" id="password" placeholder="••••••••" required value="customer123">
            <button class="btn btn-outline-secondary border-start-0 bg-white" type="button" id="toggle-password" style="border: 1px solid #E0E0E0; border-left: none; color: var(--muted-color); border-top-right-radius: var(--border-radius-sm); border-bottom-right-radius: var(--border-radius-sm);">
              <i class="fas fa-eye" id="toggle-password-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-ramen-primary w-100 py-3"><i class="fas fa-sign-in-alt"></i> Log In</button>
      </form>

      <div class="auth-divider">Or log in with demo accounts</div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <button type="button" class="btn btn-sm btn-outline-secondary w-100 py-2 small" onclick="fillDemo('customer')">
            <i class="fas fa-user text-muted"></i> Customer Demo
          </button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-sm btn-outline-secondary w-100 py-2 small" onclick="fillDemo('admin')">
            <i class="fas fa-user-shield text-muted"></i> Admin Demo
          </button>
        </div>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script>
    function fillDemo(role) {
      if (role === 'admin') {
        document.getElementById('email').value = 'admin@ramenhouse.com';
        document.getElementById('password').value = 'admin123';
      } else {
        document.getElementById('email').value = 'customer@ramenhouse.com';
        document.getElementById('password').value = 'customer123';
      }
    }
  </script>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom JS Modules -->
  <script src="/client/js/api.js"></script>
  <script src="/client/js/auth.js"></script>
</body>
</html>
